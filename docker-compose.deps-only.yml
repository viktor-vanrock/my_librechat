version: '3.8'

services:
  # MongoDB - основная БД
  mongodb:
    image: mongo:6
    container_name: chat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - librechat-network

  # Meilisearch - поиск
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: chat-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    networks:
      - librechat-network

  # PostgreSQL + pgvector - для RAG (векторная БД)
  vectordb:
    image: pgvector/pgvector:pg16
    container_name: vectordb
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    networks:
      - librechat-network

  # RAG API - для работы с файлами
  rag_api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: rag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    depends_on:
      - vectordb
    networks:
      - librechat-network

networks:
  librechat-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  meilisearch_data:
    driver: local
  postgres_data:
    driver: local